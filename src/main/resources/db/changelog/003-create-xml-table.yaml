databaseChangeLog:
  - changeSet:
      id: 003-create-xml-table
      author: dein_name
      changes:
        - sql:
            dbms: postgresql
            sql: CREATE EXTENSION IF NOT EXISTS vector;

        - createTable:
            tableName: xml_dokument
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dateiname
                  type: VARCHAR(255)
              - column:
                  name: inhalt
                  type: TEXT
              - column:
                  name: xml_embedding
                  type: "vector(1024)"
              - column:
                  name: autor_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_xml_autor
                    referencedTableName: authors
                    references: id
        - createIndex:
            indexName: idx_xml_autor_id
            tableName: xml_dokument
            columns:
              - column:
                  name: autor_id
