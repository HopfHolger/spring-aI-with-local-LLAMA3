# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      db:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: ai_db
        ports:
          - 5432:5432
        # WICHTIG: Wartet, bis die DB wirklich antwortet
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

      # HIER Docker Compose einfügen
    - name: Start Database with Docker Compose
      run: docker compose up -d

    - name: Wait for Database to be ready
      run: |
        # Wartet maximal 60 Sekunden, bis der Container 'healthy' meldet
        for i in {1..12}; do
          if [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q db))" == "healthy" ]; then
            echo "Database is ready!"
            exit 0
          fi
          echo "Waiting for database... ($i)"
          sleep 5
        done
        echo "Database failed to start in time"
        exit 1

    - name: Run Maven Tests
      run: mvn test

      # Optional: Container nach den Tests wieder stoppen
    - name: Stop Containers
      if: always()
      run: docker compose down
